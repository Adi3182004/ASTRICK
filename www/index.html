<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrick</title>
  <link rel="shortcut icon" href="assets/img/unblurimageai_astrick-shortcut (2).ico" type="image/x-icon" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>
  <!-- Added fonts from code 1 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/vendore/texllate/animate.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Neural Cursor from code 1 -->
  <div class="neural-cursor"></div>
  <div class="container">

    <!-- Start Section: Loader and Auth -->
    <section id="Start">
      <div class="row">
        <div class="col-lg-12">
          <div class="d-flex justify-content-center align-items-center vh-100">
            <div>
              <!-- Loader: Enhanced from code 1 -->
              <div id="loader">
                <div class="logo-container">
                  <div class="logo-ring"></div>
                  <img src="assets/img/astrick logo.jpg" class="logo-pulse" alt="Asterisk AI Logo" />
                  <div class="neural-particles">
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                  </div>
                  <p class="loader-text">Initializing...</p>
                  <div class="progress-bar">
                    <div class="progress-fill"></div>
                  </div>
                </div>
              </div>
              <!-- Face Auth: Enhanced from code 1 -->
              <div id="FaceAuth" class="mb-4 text-center" hidden>
                <div class="auth-container">
                  <div class="scan-overlay">
                    <div class="scan-line"></div>
                    <div class="scan-corners">
                      <div class="corner top-left"></div>
                      <div class="corner top-right"></div>
                      <div class="corner bottom-left"></div>
                      <div class="corner bottom-right"></div>
                    </div>
                  </div>
                  <lottie-player src="https://assets2.lottiefiles.com/temp/lf20_XcJCfR.json" background="transparent"
                    speed="1" style="width: 300px; height: 300px;" loop autoplay></lottie-player>
                  <h4 class="auth-status mt-3" id="authText">Ready for Face Authentication</h4>
                  <div class="auth-progress">
                    <div class="auth-dots">
                      <span></span>
                      <span></span>
                      <span></span>
                    </div>
                  </div>
                </div>
              </div>
              <!-- FaceAuthSuccess: Enhanced from code 1 -->
              <div id="FaceAuthSuccess" class="mb-4 text-center" hidden>
                <div class="auth-container success">
                  <div class="success-ring">
                    <i class="bi bi-check-circle-fill"></i>
                  </div>
                  <lottie-player src="https://assets1.lottiefiles.com/packages/lf20_lk80fpsm.json"
                    background="transparent" speed="1" style="width: 300px; height: 300px;" loop
                    autoplay></lottie-player>
                  <h4 class="auth-status mt-3">Face Authentication Successful</h4>
                  <div class="success-message">Welcome back, authorized user</div>
                </div>
              </div>
              <!-- HelloGreet: Enhanced from code 1 -->
              <div id="HelloGreet" class="mb-4 text-center" hidden>
                <div class="greet-container">
                  <div class="neural-grid"></div>
                  <lottie-player src="https://lottie.host/f60d18d4-5199-412c-b687-e5e63ae38f75/CoqjMcJIx0.json"
                    background="transparent" speed="1" style="width: 300px; height: 300px;" loop
                    autoplay></lottie-player>
                  <h3 class="greet-message mt-2">Hello Welcome Sir, how can I help you?</h3>
                  <div class="capabilities">
                    <span class="capability">Natural Language Processing</span>
                    <span class="capability">Advanced Analytics</span>
                    <span class="capability">Real-time Learning</span>
                  </div>
                </div>
              </div>
              <!-- Wish Message -->
              <div class="d-flex justify-content-center align-items-center">
                <h1 id="WishMessage" class="text-center text-light text mt-4 siri-message">Initializing...</h1>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Oval Section: Query Interface -->
    <section id="Oval" class="mb-4" hidden>
      <div class="row">
        <div class="col-md-1"></div>
        <div class="col-md-10">
          <div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
            <div id="AstrickHood">
              <div class="square">
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
                <div class="neural-core">
                  <div class="core-pulse"></div>
                </div>
              </div>
            </div>
          </div>
          <h5 class="text-light text text-center interface-title">NEURAL QUERY INTERFACE</h5>
          <div class="col-md-12 mt-4 pt-4">
            <div class="text-center">
              <div id="TextInput" class="d-flex">
                <input type="text" class="input-field" name="chatbox" id="chatbox" placeholder="type here ... " />
                <button id="SendBtn" class="glow-on-hover" hidden><i class="bi bi-send"></i></button>
                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                <button id="ChatBtn" class="glow-on-hover" data-bs-toggle="offcanvas"
                  data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"><i
                    class="bi bi-chat-dots"></i></button>
                <button id="SettingsBtn" class="glow-on-hover"><i class="bi bi-gear"></i></button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-1"></div>
      </div>
    </section>

    <!-- SiriWave Section: Enhanced style -->
    <section id="SiriWave" class="mb-4" hidden>
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
              <div class="voice-interface">
                <div class="ai-status">
                  <div class="status-indicator"></div>
                  <p class="text-start text-light mb-4 siri-message" style="font-size: 28px;">Hello, I am A.S.T.R.I.C.K
                  </p>
                </div>
                <div id="siri-container" class="visualizer">
                  <span class="wave"></span>
                  <span class="wave"></span>
                  <span class="wave"></span>
                  <span class="wave"></span>
                  <span class="wave"></span>
                  <span class="wave"></span>
                  <span class="wave"></span>
                </div>
                <div class="voice-controls">
                  <button class="voice-btn active">
                    <i class="bi bi-mic-fill"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Offcanvas Chat Interface: Enhanced style -->
  <div class="offcanvas offcanvas-start chat-canvas" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
    id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
    <div class="offcanvas-header">
      <div class="chat-header">
        <div class="chat-status">
          <div class="status-dot"></div>
          <h5 class="offcanvas-title text-white" id="offcanvasScrollingLabel">Chats</h5>
        </div>
        <button class="manual-close" aria-label="Close"
          onclick="document.getElementById('offcanvasScrolling').classList.remove('show')">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>
    <div id="chat-canvas-body" class="offcanvas-body">
      <!-- Chat messages will appear here -->
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js"></script>
  <script src="assets/vendore/texllate/jquery.fittext.js"></script>
  <script src="assets/vendore/texllate/jquery.lettering.js"></script>
  <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script src="script.js"></script>
  <script src="main.js"></script>
  <script src="controller.js"></script>
  <script src="/eel.js"></script>
  <!-- Enhanced cursor tracking script from code 1 -->
  <script>
    document.addEventListener('mousemove', (e) => {
      const cursor = document.querySelector('.neural-cursor');
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
  <!-- <button id="stopBtn" class="glow-on-hover" hidden>Stop</button> -->
</body>

</html>
